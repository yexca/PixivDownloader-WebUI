name: Docker Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  DOCKERHUB_NAMESPACE: yexca
  GHCR_NAMESPACE: ghcr.io/${{ github.repository_owner }}

jobs:
  docker:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: pixivdownloader
            context: .
            file: Dockerfile
          - name: pixivdownloader-auth-browser
            context: ./auth-browser
            file: ./auth-browser/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.file }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image.name }}:${{ github.ref_name }}
            ${{ env.GHCR_NAMESPACE }}/${{ matrix.image.name }}:${{ github.ref_name }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ matrix.image.name }}:latest
            ${{ env.GHCR_NAMESPACE }}/${{ matrix.image.name }}:latest

